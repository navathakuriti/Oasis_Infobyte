<DOCTYPE html>
    <html>
        <head>
            <title>landing page</title>
            <style>
                body{
                    margin:0;
                    font-family: Arial;
                    text-align: center;
                    color: blue;
                    font-size: 30px;
                }
                header{
                    justify-content: space-between;
                    align-items: center;
                    padding: 15px 27px;
                }
                nav{
                    background-color: black;
                    padding: 15px;
                    text-align: end;
                }
                nav a{
                    color:whitesmoke;
                    text-decoration:none;
                    font-size: 20px;
                    margin-right: 20px;
                }
                h1{
                    color:darkviolet;
                    font-size: 120px;
                    padding:15px;
                    width: 850px;
                    height: 180px;
                    align-items: center;
                    display: inline-block;
                    border-radius: 30px;
                    border: 10px solid red;
                    margin: 0;
                }
                .menu-card{
                    width: 300px;
                    background-color:lightsalmon;
                    margin: 30px auto;
                    padding: 20px;
                    border-radius: 10px;
                    border: 7px solid darkblue;
                }
                .menu-card p{
                    font-size: 30px;
                    color:lightyellow;
                }
            .container {
                display: flex;
                flex-direction:column;
                gap: 10px;
                justify-content: center;
                margin-top: 10px;
                text-align: center;
                }
                .container img {
                    width: 300px;
                    height: 150px;
                    border-radius: 10px;
                    border: 5px solid red;
                }
                button{
                    margin-top:10px;
                    padding:10px 20px;
                    font-size: 35px;
                    background-color: rgb(36, 152, 190);
                    width: 270px;
                    height: 70px;
                    border-radius: 50%;
                    border: 5px solid rgb(176, 77, 77);
                }
            </style>
        </head>
            
            <body bgcolor="lightgreen">
                <header>
                <nav>
                    <a href="#">Home</a>
                    <a href="#">About</a>
                    <a href="#">Contact</a>
                </nav>
                </header>

                <img src="vfood.jpg" width="300" height="200" align="left">
                <img src="chef.jpeg" width="300" height="200" align="right">
                <center>
                <h1 style=" background-color: aquamarine";>FAST FOOD</h1>
                </center>
                <h2>menu card</h2>
                    <div class="container">
                        <div class="menu-card">
                            <img src="pizza.jpeg" alt="image 1">
                            <h3>pizza</h3>
                            <p>₹150</p>
                            <button>35% off</button>
                        </div>
                        <div class="menu-card">
                            <img src="chips.jpg" alt="image 2">
                            <h3>french fries</h3>
                            <p>₹120</p>
                            <button>50% off</button>
                        </div>
                        <div class="menu-card">
                            <img src="chicken.jpg" alt="image 3">
                            <h3>kfc chicken</h3>
                            <p>₹250</p>
                            <button>25% off</button>
                        </div>
                        <div class="menu-card">
                            <img src="burger.jpeg" alt="image 4">
                            <h3>burger</h3>
                            <p>₹100</p>
                            <button>10% off</button>
                        </div>
                </div>
                <marquee bgcolor="red" direction="left" height="50" width="500" align=>BUY NOW BUY NOW BUY NOW</marquee>

                
            </body>
        
    </html>
</DOCTYPE>
